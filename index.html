<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot MUN - Luis Ángel Vidal Maduro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <h2>Chatbot MUN</h2>
      <p>Luis Ángel Vidal Maduro - Secretario de Comunicaciones, Regional 01 Distrito 01-02</p>
    </div>
    <div class="chat-window" id="chatWindow">
      <div class="bot-message">
        Hola, soy tu asistente MUN. Escribe tu pregunta o activa el modo entrenamiento.
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Escribe tu pregunta...">
      <button id="sendBtn">Enviar</button>
      <button id="trainBtn">Entrenamiento</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="chat.js"></script>
</body>
</html>
